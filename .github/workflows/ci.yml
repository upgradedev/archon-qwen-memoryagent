name: CI

# Archon MemoryAgent CI — gitleaks-first, then the full testing pyramid.
# The pipeline stands up a real pgvector database as a service container and runs
# unit → integration → e2e IN CI (the runner does the docker, never a dev laptop).
# Runs fully offline: no DASHSCOPE_API_KEY → the embedder + narrator auto-fall back
# to the deterministic Fakes, so the vector path is exercised end-to-end with no secrets.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Stage 1 — fail fast on any committed secret.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks detect (pinned v8.18.4, redacted)
        run: |
          curl --fail --silent --show-error --location \
            --output gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          echo "ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  # Stage 2a — dependency vulnerability audit (offline; runs in parallel with tests).
  # --audit-level=high: low/moderate advisories are reported but do not fail the
  # build (kept non-blocking to avoid transient-advisory noise); a high or critical
  # vulnerability fails the job so it is surfaced, never silently suppressed.
  dep-audit:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  # The optional React dashboard is a real shipped surface. Build and audit it
  # independently so stale frontend dependencies or API-contract drift cannot be
  # hidden by the backend-only pipeline.
  web-build:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dashboard dependencies
        working-directory: web
        run: npm ci
      - name: Audit dashboard dependencies (fail on high/critical)
        working-directory: web
        run: npm audit --audit-level=high
      - name: Typecheck and build dashboard
        working-directory: web
        run: npm run build

  # Stage 2b — documentation-drift fitness functions. Three executable guards
  # that keep the README honest against the code: (1) doc-code consistency —
  # every model id + HTTP endpoint the README claims exists in the code / route
  # tree; (2) architecture conformance — every Mermaid diagram node maps to a
  # real src/ artifact; (3) bench-golden — README headline metrics equal the
  # pinned bench/golden.json SSOT. Fully OFFLINE: the app boots the Fakes and
  # route introspection never opens the pg pool, so no DB service is needed.
  docs-consistency:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Docs-consistency fitness functions (doc-drift, arch-conformance, bench-golden)
        run: npm run test:docs

  build-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    env:
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoryagent
      DATABASE_URL: postgresql://memoryagent_app:ci-memoryagent-runtime-password-2026@localhost:5432/memoryagent
      MEMORY_APP_DB_PASSWORD: ci-memoryagent-runtime-password-2026
      CROSS_APP_DATABASE_NAME: postgres
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: memoryagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build production container (runtime dependency closure)
        run: docker build --tag archon-qwen-memoryagent:ci .

      - name: Apply schema (creates the vector(1024) memory table + HNSW index)
        run: npm run db:schema

      - name: Verify DML-only runtime role and cross-database denial
        run: npm run db:verify-role

      - name: Unit tests (no infra, no key)
        run: npm run test:unit

      - name: Integration tests (real pgvector store)
        run: npm run test:integration

      - name: E2E tests (cross-session persistence over pgvector)
        run: npm run test:e2e

      - name: Vector-recall smoke (offline Fakes — no DashScope key)
        run: npm run memory:demo

  # Stage 2c — code-coverage measurement + gate. Runs the FULL testing pyramid
  # (unit + integration + e2e) under c8 against a real pgvector service container,
  # so store.ts / db/client.ts (the DB seam) are measured for real, not just the
  # in-memory doubles. Emits a text summary + lcov; the gate step fails the build
  # if src/ coverage regresses below the honest floor. Fully OFFLINE (no key).
  coverage:
    needs: secret-scan
    runs-on: ubuntu-latest
    env:
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoryagent
      DATABASE_URL: postgresql://memoryagent_app:ci-memoryagent-runtime-password-2026@localhost:5432/memoryagent
      MEMORY_APP_DB_PASSWORD: ci-memoryagent-runtime-password-2026
      CROSS_APP_DATABASE_NAME: postgres
      # Keep the pen-test budget-exhaustion case fast (5 valid calls + 1 → 429),
      # instead of driving the default 100-call per-IP limit through the pipeline.
      INGEST_DAILY_LIMIT: "5"
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: memoryagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Apply schema (creates the vector(1024) memory table + HNSW index)
        run: npm run db:schema
      - name: Verify DML-only runtime role and cross-database denial
        run: npm run db:verify-role
      - name: Coverage gate (full pyramid under c8; fails below the src/ floor)
        run: >-
          npx c8 --check-coverage
          --statements=80 --branches=80 --functions=80 --lines=80
          node --import tsx --test --test-concurrency=1
          tests/unit/db-least-privilege.test.ts tests/unit/embeddings.test.ts tests/unit/narrator.test.ts
          tests/unit/memory.test.ts tests/unit/retrieval.test.ts
          tests/unit/metrics.test.ts tests/unit/consolidation.test.ts
          tests/unit/consistency.test.ts tests/unit/semantic-consistency.test.ts tests/unit/rerank.test.ts
          tests/unit/accuracy.test.ts tests/unit/server.test.ts
          tests/unit/skills.test.ts tests/unit/mcp.test.ts
          tests/unit/pnl.test.ts tests/unit/pipeline.test.ts
          tests/integration/pgvector-store.test.ts
          tests/integration/pipeline-ingest.test.ts
          tests/security/authz.test.ts
          tests/security/injection.test.ts
          tests/security/mcp-boundary.test.ts
          tests/security/exposure.test.ts
          tests/e2e/cross-session.test.ts
          tests/e2e/templates.test.ts
          tests/e2e/http-journeys.test.ts
          tests/e2e/mcp-journeys.test.ts
          tests/e2e/robustness.test.ts
          tests/e2e/full-journey.test.ts
          tests/e2e/readiness.test.ts
      - name: Upload lcov coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  # Stage 3 — retrieval quality gate. Replays the COMMITTED real-embedding fixture
  # (bench/fixtures/embeddings.json, from text-embedding-v4) and fails if the
  # hybrid retriever regresses below the naive-vector RAG baseline. No key, no
  # spend — the fixture makes the SOTA claim reproducible offline.
  benchmark:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Retrieval benchmark gate (hybrid >= naive; benchmark discriminates; re-rank reported)
        run: npm run bench -- --gate
      - name: Self-auditing memory-consistency gate (100% detection, 0 false positives)
        run: npm run bench:consistency -- --gate
      - name: Meaning-level semantic self-audit gate (90% recall, 100% precision, 0 FP)
        run: npm run bench:semantic -- --gate
      - name: Broad held-out semantic gate (48 pairs, hard controls, all misses retained)
        run: npm run bench:semantic:heldout -- --gate
      - name: Contradiction-resolution gate (structural invariants + policy-conformance)
        run: npm run bench:resolution -- --gate
      - name: Grounded-answer accuracy gate (replays committed qwen-plus answers; correctness + grounding)
        run: npm run bench:accuracy -- --gate
      - name: External Mem0 evidence runner self-test (no provider call)
        run: npm run bench:external:self-test

  # Stage 4 — submission READINESS GATE. Encodes the four judging criteria
  # (Technical 30 · Innovation 30 · Problem 25 · Presentation 15) as machine
  # checks that EXECUTE the code they audit (MCP tools, skill dispatch, RRF,
  # re-rank, both self-audits, the semantic benchmark) + docs-consistency + the
  # measured Problem-value number. Fails the build if automatable completeness
  # < 95%. Fully OFFLINE (no key, no DB, no network). Emits readiness.json.
  readiness:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Readiness gate (weighted completeness ≥ 95% on the automatable path)
        run: npm run readiness -- --gate
      - name: Upload readiness.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: readiness.json
          if-no-files-found: warn

  # Stage 5 — PEN-TEST (application-security) layer. Drives the REAL HTTP API + MCP
  # surface with adversarial input: authorization + daily-spend budget (429),
  # prompt-injection resistance (a genuine contradiction is STILL flagged despite an
  # injected "report consistent" instruction, read-only), MCP tool-boundary /
  # excessive-agency, sensitive-data exposure (no stack / path / secret leaks), and
  # SQL-parameterization against a real pgvector (a `DROP TABLE` payload stays inert
  # data). Fully OFFLINE — no DASHSCOPE key; the pg service makes the SQLi case real.
  pen-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    env:
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoryagent
      DATABASE_URL: postgresql://memoryagent_app:ci-memoryagent-runtime-password-2026@localhost:5432/memoryagent
      MEMORY_APP_DB_PASSWORD: ci-memoryagent-runtime-password-2026
      CROSS_APP_DATABASE_NAME: postgres
      # Small budget so the 429 exhaustion case is fast (5 valid calls, then a 429).
      INGEST_DAILY_LIMIT: "5"
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: memoryagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Apply schema (creates the vector(1024) memory table + HNSW index)
        run: npm run db:schema
      - name: Verify DML-only runtime role and cross-database denial
        run: npm run db:verify-role
      - name: Pen-test suite (authz · injection · MCP boundary · exposure · SQLi)
        run: npm run test:security

  # Stage 6 — LOAD (performance) smoke. Boots the backend OFFLINE (deterministic
  # Fakes, no key) against a real pgvector, seeds the demo memories, then runs a
  # bounded k6 smoke that HOLDS p95 latency + error-rate SLOs on /health, /recall
  # and /consistency (the k6 thresholds fail the job on a regression). This is the
  # free, safe-on-every-push counterpart to the manual load-test.yml workflow, which
  # drives the LIVE box with real Qwen spend.
  load:
    needs: secret-scan
    runs-on: ubuntu-latest
    env:
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memoryagent
      DATABASE_URL: postgresql://memoryagent_app:ci-memoryagent-runtime-password-2026@localhost:5432/memoryagent
      MEMORY_APP_DB_PASSWORD: ci-memoryagent-runtime-password-2026
      CROSS_APP_DATABASE_NAME: postgres
      PORT: "9000"
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: memoryagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Apply schema (creates the vector(1024) memory table + HNSW index)
        run: npm run db:schema
      - name: Verify DML-only runtime role and cross-database denial
        run: npm run db:verify-role

      - name: Install k6
        run: |
          set -euo pipefail
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Boot the OFFLINE backend (Fakes, no key) and wait for /health
        run: |
          set -euo pipefail
          nohup npm start > server.log 2>&1 &
          echo "waiting for the backend to answer /health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9000/health > /dev/null; then
              echo "backend up after ${i} tries"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:9000/health | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Seed the demo memories (so /recall + /consistency have data)
        run: curl -sf -X POST http://localhost:9000/demo/seed | tee /dev/stderr

      - name: k6 load smoke (offline profile, bounded) — SLO thresholds gate the job
        env:
          OFFLINE: "true"
          TARGET_URL: "http://localhost:9000"
        run: k6 run load/recall-load.js

      - name: Upload k6 summary + server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-offline-smoke
          path: |
            load-summary.json
            server.log
          if-no-files-found: warn
          retention-days: 14
