name: Generate Authenticated Demo Video

# Authenticated <3-minute demo-video builder for the MemoryAgent track. It needs
# the private MEMORYAGENT_JUDGE_API_KEY Actions secret and never renders/logs it.
# No local recording needed:
#   1. scripts/capture_live.sh drives the LIVE Alibaba Cloud box with protected
#      mutations scoped by the private reviewer credential
#      (https://memory.43.106.13.19.sslip.io): GET /health -> real Qwen proof; SESSION A
#      POST /ingest -> writes memories to pgvector on Alibaba; a FRESH SESSION B
#      POST /recall (x2) -> recalls them by meaning with real qwen-plus answers +
#      real pgvector cosine scores. Structured jq HARD-CHECKS: a box that is down,
#      or silently on the offline Fakes, or a blank recall, FAILS the job.
#   2. The voiceover is synthesized from docs/narration.txt: ElevenLabs when the
#      ELEVEN_LABS_KEY secret is set, otherwise (or on any ElevenLabs error) an
#      explicitly rights-attested edge-tts voice — so the demo stays narrated
#      without treating free access as publication permission.
#   3. scripts/make_screencast.py renders the captured real run as a terminal
#      screencast (docs/screencast_transcript.txt is written by step 1).
#   4. ffmpeg composes a title card + burned captions + screencast + outro, then
#      muxes the voiceover -> demo/final-media/memoryagent-demo.mp4 (uploaded as an artifact).
#
# Run: configure MEMORYAGENT_JUDGE_API_KEY, then Actions ->
# "Generate Authenticated Demo Video" -> Run workflow. Review before publishing.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Live Alibaba Cloud base URL to demo against."
        required: false
        default: "https://memory.43.106.13.19.sslip.io"
      voice_id:
        description: "ElevenLabs voice ID."
        required: false
        default: "pNInz6obpgDQGcFmaJgB"
      model_id:
        description: "ElevenLabs model ID."
        required: false
        default: "eleven_multilingual_v2"
      repo_url:
        description: "Repo URL shown on the outro card."
        required: false
        default: "github.com/upgradedev/archon-qwen-memoryagent"
      voice_rights_attested:
        description: "I confirm the selected generated voice is authorized for public competition use."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  video:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: requirements/video-demo.lock

      - name: Fail closed unless every media artifact is repo-contained
        run: |
          set -euo pipefail
          while IFS='|' read -r label path; do
            [ -n "$label" ] || continue
            python3 scripts/repo_paths.py "$path" --label "$label" >/dev/null
          done <<'PATHS'
          TRANSCRIPT|docs/screencast_transcript.txt
          WEB_SHOTS_DIR|web_shots
          REQUEST_BODY|body.json
          NARRATION_MAIN|narration_main.txt
          NARRATION_WEB|narration_web.txt
          VOICE_MAIN|vo_main.mp3
          VOICE_WEB|vo_web.mp3
          VOICEOVER|voiceover.mp3
          SCREENCAST|screencast.mp4
          WEB_CAPTION|web_cap.txt
          WEB_VIDEO|web.mp4
          CAPS_DIR|caps
          CAPTION_WINDOWS_JSON|caption_windows.json
          TITLE_VIDEO|title.mp4
          OUTRO_VIDEO|outro.mp4
          CAPTIONED_SCREENCAST|tour_cap.mp4
          COMPOSITE_VIDEO|full.mp4
          VIDEO_MANIFEST|video_manifest.json
          FINAL_VIDEO|demo/final-media/memoryagent-demo.mp4
          PATHS

      - name: Ensure ffmpeg + fonts + hash-locked Python tooling
        run: |
          set -euo pipefail
          command -v ffmpeg >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
          dpkg -s fonts-dejavu-core >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y fonts-dejavu-core)
          # DejaVuSans-Bold: caption/title text. DejaVuSansMono: terminal screencast.
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)
          python -m pip install --disable-pip-version-check \
            --require-hashes --only-binary=:all: \
            --requirement requirements/video-demo.lock
          python -m pip check

      # Drive the LIVE Alibaba box and capture a REAL two-session run. This is the
      # gate: if the box is unreachable, reverted to the offline Fakes, or returns
      # a blank/stub recall, the structured jq checks fail the whole job here.
      - name: Capture live two-session run (Alibaba Cloud)
        env:
          DEMO_BASE_URL: ${{ github.event.inputs.base_url }}
          DEMO_JUDGE_API_KEY: ${{ secrets.MEMORYAGENT_JUDGE_API_KEY }}
        run: |
          set -euo pipefail
          bash scripts/capture_live.sh
          test -s docs/screencast_transcript.txt \
            || { echo "::error::transcript not produced — live capture failed"; exit 1; }

      # Drive the LIVE Explorer UI (src/ui.html, served at BASE/ and BASE/ui) in a
      # headless Chromium: seed -> type a company + question -> Recall -> a grounded,
      # CITED qwen-plus answer -> the "memories N" browse view. Captured as three
      # 1920x1080 screenshots (assembled into the web segment later). The script
      # HARD-FAILS on a blank/uncited answer or a positioning leak, so a bad web
      # scene fails the job instead of shipping.
      - name: Capture live Explorer UI (Playwright headless Chromium)
        env:
          DEMO_BASE_URL: ${{ github.event.inputs.base_url }}
        run: |
          set -euo pipefail
          python -m playwright install --with-deps chromium
          python scripts/capture_web.py
          for f in 1_home 2_answer 3_browse; do
            test -s "web_shots/${f}.png" \
              || { echo "::error::web screenshot ${f}.png missing — live UI capture failed"; exit 1; }
          done

      # narration.txt is one script but drives two clips: the MAIN narration (all but
      # the last paragraph) times the terminal screencast exactly as before; the final
      # paragraph is the WEB beat, spoken over the browser segment. Synthesizing them
      # as two files lets us measure each and land the beat precisely on the web frames
      # (the padded-voiceover step). Terminal timing is unchanged (main == today's text).
      - name: Synthesize voiceover (main + web beat · ElevenLabs -> edge-tts fallback)
        id: vo
        env:
          XI_API_KEY: ${{ secrets.ELEVEN_LABS_KEY }}
          VOICE_ID: ${{ github.event.inputs.voice_id }}
          MODEL_ID: ${{ github.event.inputs.model_id }}
          VOICE_RIGHTS_ATTESTED: ${{ github.event.inputs.voice_rights_attested }}
        run: |
          set -euo pipefail
          [ "${VOICE_RIGHTS_ATTESTED}" = "true" ] || {
            echo "::error::voice publication rights were not attested"; exit 1;
          }
          # Split narration.txt on blank lines: last paragraph -> web beat, rest -> main.
          python3 - <<'PY'
          import re
          paras = [p.strip() for p in re.split(r"\n\s*\n", open("docs/narration.txt", encoding="utf-8").read()) if p.strip()]
          assert len(paras) >= 2, "narration.txt must have >= 2 paragraphs (main + web beat)"
          open("narration_main.txt", "w", encoding="utf-8").write("\n\n".join(paras[:-1]) + "\n")
          open("narration_web.txt", "w", encoding="utf-8").write(paras[-1] + "\n")
          print(f"main paragraphs: {len(paras)-1} · web beat chars: {len(paras[-1])}")
          PY

          # Synthesize one text file to one mp3. ElevenLabs when the secret is set;
          # the explicitly rights-attested edge-tts voice is the fallback so a
          # missing/expired key or an ElevenLabs error can NEVER leave the demo silent.
          synth() {
            local IN="$1" OUT="$2" have=false HTTP
            if [ -n "${XI_API_KEY:-}" ]; then
              jq -Rs --arg m "$MODEL_ID" \
                '{text: ., model_id: $m, voice_settings: {stability: 0.45, similarity_boost: 0.8, use_speaker_boost: true}}' \
                "$IN" > body.json
              HTTP=$(curl -sS -w "%{http_code}" -X POST \
                "https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?output_format=mp3_44100_128" \
                -H "xi-api-key: ${XI_API_KEY}" -H "Content-Type: application/json" -H "Accept: audio/mpeg" \
                --data @body.json -o "$OUT" || echo "000")
              if [ "$HTTP" = "200" ] && [ -f "$OUT" ] && [ "$(wc -c < "$OUT")" -gt 8000 ]; then
                echo "ElevenLabs voiceover OK — ${OUT} ($(wc -c < "$OUT") bytes)"; have=true
              else
                echo "::warning::ElevenLabs synthesis failed for ${IN} (HTTP ${HTTP}) — falling back to edge-tts."
                rm -f "$OUT"
              fi
            else
              echo "::warning::ELEVEN_LABS_KEY not set — using the rights-attested edge-tts voice for ${IN}."
            fi
            if [ "$have" != "true" ]; then
              python -m edge_tts --voice en-US-GuyNeural --file "$IN" --write-media "$OUT"
              [ -f "$OUT" ] && [ "$(wc -c < "$OUT")" -gt 8000 ] \
                || { echo "::error::edge-tts produced no usable audio for ${IN} — cannot ship a silent video."; exit 1; }
              echo "edge-tts voiceover OK — ${OUT} ($(wc -c < "$OUT") bytes)"
            fi
          }

          synth narration_main.txt vo_main.mp3
          synth narration_web.txt  vo_web.mp3

          A_MAIN=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 vo_main.mp3)
          A_WEB=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 vo_web.mp3)
          echo "main audio: ${A_MAIN}s · web beat audio: ${A_WEB}s"
          echo "a_main=${A_MAIN}" >> "$GITHUB_OUTPUT"
          echo "a_web=${A_WEB}"   >> "$GITHUB_OUTPUT"
          echo "have_vo=true"      >> "$GITHUB_OUTPUT"

      - name: Compute target duration
        id: dur
        env:
          A_MAIN: ${{ steps.vo.outputs.a_main }}
        run: |
          set -euo pipefail
          # Screencast must outlast BOTH the MAIN VO (+3s tail) AND the last caption
          # end, so a fast VO never clips the closing captions. Driven by the MAIN
          # narration only (the web beat plays over the browser segment, not the
          # screencast), so the terminal timeline is identical to before.
          CAP_END=$(awk -F'|' 'NF>=2{print $2}' scripts/captions.txt | sort -n | tail -1)
          TARGET=$(python3 -c "print(round(max(float('${A_MAIN}')+3.0, float('${CAP_END}')+2.0),1))")
          echo "caption end: ${CAP_END}s · main audio ${A_MAIN}s -> target=${TARGET}"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

      - name: Render terminal screencast
        env:
          TARGET_SECONDS: ${{ steps.dur.outputs.target }}
          FONT_MONO: /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          FONT_MONO_BOLD: /usr/share/fonts/truetype/dejavu/DejaVuSansMono-Bold.ttf
          OUTPUT: screencast.mp4
        run: |
          set -euo pipefail
          python scripts/make_screencast.py
          test -f screencast.mp4
          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 screencast.mp4

      # Assemble the three live-UI screenshots into the browser segment. Length is
      # SELF-CAPPED so title(3) + screencast + web + outro(3) < 175, and must be at
      # least as long as the spoken web beat. A one-line caption is burned on directly
      # (same style as the terminal captions) — scripts/captions.txt is untouched, so
      # the caption-driven screencast target is unaffected.
      - name: Assemble web segment (browser) mp4
        id: webseg
        env:
          FONT: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          A_WEB: ${{ steps.vo.outputs.a_web }}
          A_MAIN: ${{ steps.vo.outputs.a_main }}
        run: |
          set -euo pipefail
          for f in 1_home 2_answer 3_browse; do test -s "web_shots/${f}.png"; done
          S=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 screencast.mp4)
          CAP_END=$(awk -F'|' 'NF>=2{print $2}' scripts/captions.txt | sort -n | tail -1)
          # The web segment is sized to comfortably contain the spoken web beat
          # (which varies with ElevenLabs pacing): WEB = beat + 1.2s lead-out, clamped
          # to the task's ~6-10s window.
          WEB=$(python3 -c "print(round(min(10.0, max(6.0, float('${A_WEB}') + 1.2)), 2))")
          python3 -c "import sys; sys.exit(0 if ${WEB} >= float('${A_WEB}') else 1)" \
            || { echo "::error::web segment ${WEB}s is shorter than the web beat ${A_WEB}s"; exit 1; }
          # S_EFF = the effective terminal-screencast length used by the rest of the
          # pipeline (caption trim + voiceover pad). It ENDS the screencast right when
          # the main narration ends (A_MAIN + 0.3), so there is no long silent frozen
          # frame before the browser appears — the beat flows straight on. The captions
          # are SCALED to this window (scripts/build_caption_filter.py), so the closing
          # caption is never clipped and never floored past the voice — which removes the
          # old CAP_END+1 floor that could leave a silent frozen seam on a fast run.
          # Hard-capped at SCAP so title+screencast+web+outro stays below the 175s
          # publication safety limit no matter
          # how long the (pacing-variable) narration ran.
          SCAP=$(python3 -c "print(round(175.0 - 3.0 - 3.0 - ${WEB} - 0.3, 3))")
          S_EFF=$(python3 -c "print(round(min(float('${S}'), ${SCAP}, float('${A_MAIN}')+0.3), 3))")
          echo "screencast=${S}s · web=${WEB}s · cap_end=${CAP_END}s · main=${A_MAIN}s · SCAP=${SCAP}s -> S_EFF=${S_EFF}s"
          echo "web_secs=${WEB}"   >> "$GITHUB_OUTPUT"
          echo "s_eff=${S_EFF}"    >> "$GITHUB_OUTPUT"
          # Frame split: home (typed query + count), answer (hero, cited), browse.
          # Use per-image `-loop 1 -t D` inputs + the concat FILTER, whose output is
          # EXACTLY D1+D2+D3 (the concat demuxer's trailing-frame handling inflates the
          # duration and would blow the 175s safety budget). One burned caption after concat.
          D1=$(python3 -c "print(round(${WEB}*0.24, 3))")
          D2=$(python3 -c "print(round(${WEB}*0.46, 3))")
          D3=$(python3 -c "print(round(${WEB} - ${WEB}*0.24 - ${WEB}*0.46, 3))")
          echo "web frames ${D1}/${D2}/${D3}s · beat=${A_WEB}s"
          # Keep this <= ~62 chars: DejaVuSans-Bold at fontsize 40 overflows 1920px
          # (and clips at both edges) beyond that.
          printf '%s' 'In the browser: a company + a question -> a cited answer' > web_cap.txt
          SP="scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2,setsar=1,fps=30"
          CAP="drawtext=fontfile=${FONT}:textfile=web_cap.txt:expansion=none:fontsize=40:fontcolor=white:line_spacing=8:box=1:boxcolor=black@0.55:boxborderw=18:x=(w-text_w)/2:y=h-140"
          ffmpeg -y \
            -loop 1 -t "$D1" -i web_shots/1_home.png \
            -loop 1 -t "$D2" -i web_shots/2_answer.png \
            -loop 1 -t "$D3" -i web_shots/3_browse.png \
            -filter_complex "[0:v]${SP}[v0];[1:v]${SP}[v1];[2:v]${SP}[v2];[v0][v1][v2]concat=n=3:v=1:a=0[cat];[cat]${CAP},format=yuv420p[outv]" \
            -map "[outv]" -r 30 -c:v libx264 -preset veryfast -pix_fmt yuv420p web.mp4
          test -f web.mp4
          echo "web segment duration:"
          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 web.mp4

      # Build the final voiceover = main narration + silence pad + web beat, so the
      # beat lands exactly when the browser segment appears. pad = (effective/capped
      # screencast length S_EFF) - (main audio) + 0.5, so the browser is on screen a
      # beat before "…in the browser" is spoken. Re-encoded via the concat FILTER
      # (uniform 44.1k stereo) to avoid mp3 frame-boundary clicks from a raw concat.
      - name: Assemble padded voiceover (main + silence + web beat)
        env:
          A_MAIN: ${{ steps.vo.outputs.a_main }}
          S_EFF: ${{ steps.webseg.outputs.s_eff }}
        run: |
          set -euo pipefail
          PAD=$(python3 -c "print(round(max(0.0, float('${S_EFF}') - float('${A_MAIN}') + 0.5), 3))")
          echo "S_EFF=${S_EFF}s · main audio=${A_MAIN}s -> silence pad=${PAD}s"
          ffmpeg -y -i vo_main.mp3 -f lavfi -t "${PAD}" -i anullsrc=r=44100:cl=stereo -i vo_web.mp3 \
            -filter_complex "[0:a]aformat=sample_rates=44100:channel_layouts=stereo[a0];[1:a]aformat=sample_rates=44100:channel_layouts=stereo[a1];[2:a]aformat=sample_rates=44100:channel_layouts=stereo[a2];[a0][a1][a2]concat=n=3:v=0:a=1[out]" \
            -map "[out]" -c:a libmp3lame -q:a 2 voiceover.mp3
          test -f voiceover.mp3
          echo "final voiceover duration:"
          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 voiceover.mp3

      - name: Compose demo video (title + captions + screencast + outro + VO)
        env:
          REPO_URL: ${{ github.event.inputs.repo_url }}
          HAVE_VO: ${{ steps.vo.outputs.have_vo }}
          S_EFF: ${{ steps.webseg.outputs.s_eff }}
          A_MAIN: ${{ steps.vo.outputs.a_main }}
          A_WEB: ${{ steps.vo.outputs.a_web }}
          WEB_SECS: ${{ steps.webseg.outputs.web_secs }}
        run: |
          set -euo pipefail
          FONT=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          VID=screencast.mp4
          test -f "$VID" || { echo "::error::no screencast produced"; exit 1; }
          mkdir -p caps

          # ---- Title card (3s, silent) — dark emerald bg ----
          printf '%s' 'Archon MemoryAgent' > caps/title1.txt
          printf '%s' 'Cross-session memory, live on Alibaba Cloud' > caps/title2.txt
          printf '%s' 'Qwen · pgvector · MemoryAgent track' > caps/title3.txt
          ffmpeg -y -f lavfi -i color=c=0x0d2b22:s=1920x1080:d=3:r=30 -vf \
            "drawtext=fontfile=$FONT:textfile=caps/title1.txt:expansion=none:fontcolor=0x34d399:fontsize=118:x=(w-text_w)/2:y=(h/2)-140,drawtext=fontfile=$FONT:textfile=caps/title2.txt:expansion=none:fontcolor=white:fontsize=52:x=(w-text_w)/2:y=(h/2)+20,drawtext=fontfile=$FONT:textfile=caps/title3.txt:expansion=none:fontcolor=0x9ca3af:fontsize=40:x=(w-text_w)/2:y=(h/2)+110,format=yuv420p" \
            -c:v libx264 -pix_fmt yuv420p -r 30 title.mp4

          # ---- Outro card (3s, silent) ----
          printf '%s' 'Open source · MIT' > caps/outro1.txt
          printf '%s' "$REPO_URL" > caps/outro2.txt
          ffmpeg -y -f lavfi -i color=c=0x0d2b22:s=1920x1080:d=3:r=30 -vf \
            "drawtext=fontfile=$FONT:textfile=caps/outro1.txt:expansion=none:fontcolor=white:fontsize=80:x=(w-text_w)/2:y=(h/2)-80,drawtext=fontfile=$FONT:textfile=caps/outro2.txt:expansion=none:fontcolor=0x34d399:fontsize=46:x=(w-text_w)/2:y=(h/2)+40,format=yuv420p" \
            -c:v libx264 -pix_fmt yuv420p -r 30 outro.mp4

          # ---- Burned-caption drawtext chain from scripts/captions.txt ----
          # scale/pad FIRST (fontsize is output-pixel space), then one drawtext per line.
          # Caption windows are SCALED to the MEASURED main-narration length (A_MAIN) and
          # clamped inside the trimmed screencast (S_EFF) by build_caption_filter.py, so
          # they cannot drift with ElevenLabs/edge-tts pacing (defect 2). The helper also
          # writes caption_windows.json (ABSOLUTE video time = screencast-local + 3s title)
          # for the sync gate. enable= is single-quoted so its commas are protected inside
          # the filtergraph. NO spaces between chained drawtext filters.
          FILTER="scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2,setsar=1,format=yuv420p"
          CAP_CHAIN=$(CAPTIONS_FILE=scripts/captions.txt A_MAIN="${A_MAIN}" S_EFF="${S_EFF}" \
            TITLE_DUR=3.0 LEAD=0.3 FONT="$FONT" CAPS_DIR=caps \
            CAPTION_WINDOWS_JSON=caption_windows.json \
            python3 scripts/build_caption_filter.py)
          FILTER="$FILTER$CAP_CHAIN"
          echo "built $(python3 -c "import json;print(len(json.load(open('caption_windows.json'))))") caption clauses (scaled to A_MAIN=${A_MAIN}s, S_EFF=${S_EFF}s)"

          # ---- Burn captions onto the screencast, trimmed to S_EFF ----
          # S_EFF is the hard-capped screencast length that guarantees the total stays
          # <175s. It sits past the last caption end (157s), so this only ever trims
          # surplus held-final-frame tail — never a caption reveal or terminal content.
          S_EFF="${S_EFF}"
          ffmpeg -y -i "$VID" -vf "$FILTER" -t "$S_EFF" -c:v libx264 -preset veryfast -pix_fmt yuv420p -r 30 -an tour_cap.mp4

          # ---- Concat title -> captioned screencast -> web segment -> outro ----
          test -f web.mp4 || { echo "::error::no web segment produced"; exit 1; }
          ffmpeg -y -i title.mp4 -i tour_cap.mp4 -i web.mp4 -i outro.mp4 -filter_complex \
            "[0:v]scale=1920:1080,setsar=1,fps=30,format=yuv420p[v0];[1:v]scale=1920:1080,setsar=1,fps=30,format=yuv420p[v1];[2:v]scale=1920:1080,setsar=1,fps=30,format=yuv420p[v2];[3:v]scale=1920:1080,setsar=1,fps=30,format=yuv420p[v3];[v0][v1][v2][v3]concat=n=4:v=1:a=0[outv]" \
            -map "[outv]" -c:v libx264 -preset veryfast -pix_fmt yuv420p -r 30 full.mp4

          if [ "${HAVE_VO}" = "true" ] && [ -f voiceover.mp3 ]; then
            # ---- Mux the VO, delayed by the 3s title so it starts on the screencast ----
            # apad makes the audio effectively infinite; -shortest then lands at the FULL
            # video length (title + screencast + web segment + outro), so neither the
            # web beat nor the outro is truncated.
            ffmpeg -y -i full.mp4 -i voiceover.mp3 \
              -filter_complex "[1:a]adelay=3000:all=1,apad[a]" \
              -map 0:v:0 -map "[a]" -c:v copy -c:a aac -b:a 192k -shortest demo/final-media/memoryagent-demo.mp4
          else
            cp full.mp4 demo/final-media/memoryagent-demo.mp4
          fi
          ls -la demo/final-media/memoryagent-demo.mp4
          echo "final duration:"
          FINAL=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 demo/final-media/memoryagent-demo.mp4)
          echo "${FINAL}s"
          # Publication gate leaves five seconds of margin below the contest's <180s rule.
          python3 -c "import sys; sys.exit(0 if float('${FINAL}') < 175.0 else 1)" \
            || { echo "::error::final video ${FINAL}s reaches the 175s safety limit"; exit 1; }

          # ---- Segment manifest for the sync gate (concat order + measured durations) ----
          # segments[] is the EXACT concat order used above: title -> screencast -> web -> outro.
          python3 - <<PY
          import json
          json.dump({
              "fps": 30,
              "title_dur": 3.0,
              "screencast_dur": float("${S_EFF}"),
              "web_dur": float("${WEB_SECS}"),
              "outro_dur": 3.0,
              "segments": ["title", "screencast", "web", "outro"],
              "a_main": float("${A_MAIN}"),
              "a_web": float("${A_WEB}"),
              "vo_delay": 3.0,
              "have_vo": "${HAVE_VO}" == "true",
          }, open("video_manifest.json", "w"), indent=2)
          print("wrote video_manifest.json")
          PY

      # PERMANENT SYNC GATE — measures the shipped mp4 and FAILS the job unless the audio,
      # frames and captions are aligned AND the segment order is title -> screencast -> web
      # -> outro. This runs on every future build, so an out-of-sync or mis-ordered video
      # can never ship again. See scripts/verify_video_sync.py for the four guarantees.
      - name: Verify A/V/caption sync (permanent gate)
        run: |
          set -euo pipefail
          python3 scripts/verify_video_sync.py demo/final-media/memoryagent-demo.mp4

      - name: Upload demo video
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: archon-memoryagent-demo-video
          path: |
            demo/final-media/memoryagent-demo.mp4
            voiceover.mp3
            screencast.mp4
            web.mp4
            web_shots/*.png
            docs/screencast_transcript.txt
            video_manifest.json
            caption_windows.json
          if-no-files-found: error
          retention-days: 14
