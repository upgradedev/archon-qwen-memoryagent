# Serverless Devs manifest — deploy the MemoryAgent backend to Alibaba Cloud
# Function Compute (FC 3.0) as a custom-container HTTP function.
#
# Prerequisites (user-provided):
#   - Alibaba Cloud account + AccessKey (ALIBABA_CLOUD_ACCESS_KEY_ID / _SECRET)
#   - A Container Registry (ACR) namespace in the SAME region as the function
#   - `npm i -g @serverless-devs/s` and `s config add` with the AccessKey
#
# Deploy:  cd deploy && s deploy
# The container must run an HTTP server on ${vars.caPort} (our server.ts → PORT).

edition: 3.0.0
name: archon-qwen-memoryagent
access: default

vars:
  region: ${env('REGION', 'ap-southeast-1')}
  caPort: 9000
  # deploy-fc.sh exports the immutable, just-pushed image URI.
  image: ${env('IMAGE_URI')}

resources:
  memoryagent:
    component: fc3
    props:
      region: ${vars.region}
      functionName: archon-qwen-memoryagent
      description: Archon MemoryAgent — persistent cross-session memory on Qwen + pgvector
      runtime: custom-container
      timeout: 60
      memorySize: 1024
      caPort: ${vars.caPort}
      # Managed PostgreSQL is private. FC must join the database VPC while
      # retaining outbound internet access for Alibaba Model Studio.
      internetAccess: true
      vpcConfig:
        vpcId: ${env('FC_VPC_ID')}
        securityGroupId: ${env('FC_SECURITY_GROUP_ID')}
        vSwitchIds:
          - ${env('FC_VSWITCH_ID')}
      # Persist stdout/stderr plus request/instance metrics in FC-managed SLS.
      logConfig: auto
      customContainerConfig:
        image: ${vars.image}
      environmentVariables:
        PORT: "9000"
        NODE_ENV: production
        APPLY_SCHEMA_ON_START: "true"
        DATABASE_URL: ${env('DATABASE_URL')}
        DASHSCOPE_API_KEY: ${env('DASHSCOPE_API_KEY')}
        DASHSCOPE_BASE_URL: ${env('DASHSCOPE_BASE_URL', 'https://dashscope-intl.aliyuncs.com/compatible-mode/v1')}
        QWEN_MODEL: ${env('QWEN_MODEL', 'qwen-plus')}
        QWEN_EMBED_MODEL: ${env('QWEN_EMBED_MODEL', 'text-embedding-v4')}
        EMBED_DIM: ${env('EMBED_DIM', '1024')}
        JUDGE_API_KEY: ${env('JUDGE_API_KEY')}
        JUDGE_TENANT_ID: ${env('JUDGE_TENANT_ID', '_public')}
        JUDGE_AUTH_REQUIRED: "true"
        PUBLIC_TENANT_ID: ${env('PUBLIC_TENANT_ID', '_public')}
        CORS_ORIGIN: ${env('CORS_ORIGIN', '')}
        QWEN_RERANK_MODEL: ${env('QWEN_RERANK_MODEL', 'qwen-plus')}
        RERANK_TIMEOUT_MS: ${env('RERANK_TIMEOUT_MS', '3000')}
        SEMANTIC_JUDGE_TIMEOUT_MS: ${env('SEMANTIC_JUDGE_TIMEOUT_MS', '8000')}
        SEMANTIC_EMBED_TIMEOUT_MS: ${env('SEMANTIC_EMBED_TIMEOUT_MS', '10000')}
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
